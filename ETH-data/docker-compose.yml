services:
  db:
    image: postgres:16-alpine
    container_name: whales-move-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: whales
      POSTGRES_USER: whales
      POSTGRES_PASSWORD: whales
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whales -d whales']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
